<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
  <style>
    /* ── Search bar ── */
    .hp-search-bar {
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 14px; padding: .8rem 1.1rem;
      display: flex; align-items: center; gap: .8rem;
    }
    .hp-search-input {
      flex: 1; background: transparent; border: none;
      color: #888; font-size: .88rem; outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .hp-search-input::placeholder { color: #444; }
    .hp-divider { width: 1px; height: 22px; background: #1e1e1e; flex-shrink: 0; }
    .hp-filter-label { font-size: .8rem; color: #555; white-space: nowrap; }
    .hp-search-btn {
      background: linear-gradient(135deg, #ff6b35, #ff3864);
      color: #fff; border: none; padding: .45rem 1.2rem;
      border-radius: 8px; font-weight: 700; font-size: .82rem;
      cursor: pointer; flex-shrink: 0; transition: all .2s;
    }
    .hp-search-btn:hover { filter: brightness(1.1); }

    /* ── Category pills ── */
    .cat-pills { display: flex; gap: .5rem; flex-wrap: wrap; }
    .cat-pill {
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 50px; padding: .4rem 1rem;
      font-size: .78rem; font-weight: 600; color: #666;
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      transition: all .2s; text-decoration: none; display: inline-block;
    }
    .cat-pill:hover { border-color: #ff6b35; color: #ff6b35; }
    .cat-pill.active { background: linear-gradient(135deg, #ff6b35, #ff3864); border-color: transparent; color: #fff; }

    /* ── Filter sidebar ── */
    .filter-panel {
      background: #111; border: 1px solid #1a1a1a;
      border-radius: 14px; padding: 1.3rem 1.2rem;
      position: sticky; top: 80px;
    }
    .filter-title {
      font-size: .72rem; font-weight: 700; letter-spacing: .08em;
      color: #555; text-transform: uppercase; margin-bottom: .8rem;
    }
    .filter-label { font-size: .8rem; color: #888; margin-bottom: .35rem; display: block; }
    .filter-select, .filter-input {
      width: 100%; background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 8px; color: #ccc; font-size: .8rem;
      padding: .45rem .7rem; outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-select:focus, .filter-input:focus { border-color: #ff6b35; }
    .filter-select option { background: #0d0d0d; }
    .filter-divider { border: none; border-top: 1px solid #1a1a1a; margin: 1rem 0; }
    .btn-apply-filter {
      width: 100%; background: linear-gradient(135deg,#ff6b35,#ff3864);
      color: #fff; border: none; border-radius: 8px;
      font-size: .82rem; font-weight: 700; padding: .5rem;
      cursor: pointer; transition: filter .2s;
    }
    .btn-apply-filter:hover { filter: brightness(1.1); }
    .btn-clear-filter {
      width: 100%; background: transparent; color: #555;
      border: 1px solid #1e1e1e; border-radius: 8px;
      font-size: .78rem; padding: .4rem; margin-top: .5rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-clear-filter:hover { color: #ff6b35; border-color: #ff6b35; }

    /* ── Job cards ── */
    .job-list-card {
      background: #111; border: 1px solid #1a1a1a;
      border-radius: 14px; padding: 1.2rem 1.4rem;
      cursor: pointer; transition: border-color .2s, transform .15s;
      position: relative; overflow: hidden;
    }
    .job-list-card::before {
      content: ''; position: absolute;
      top:0;left:0;right:0; height: 2px;
      opacity: 0; transition: opacity .2s;
    }
    .job-list-card:hover { border-color: #333; transform: translateY(-2px); }
    .job-list-card:hover::before { opacity: 1; }
    .jlc-orange::before { background: linear-gradient(90deg,#ff6b35,#ff3864); }
    .jlc-green::before  { background: linear-gradient(90deg,#1a936f,#0de5a8); }
    .jlc-purple::before { background: linear-gradient(90deg,#7b2d8b,#c45be5); }
    .jlc-blue::before   { background: linear-gradient(90deg,#004e89,#5bafd6); }
    .mc-tag {
      font-size: .68rem; font-weight: 700;
      padding: .2rem .65rem; border-radius: 50px;
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-ft  { background:rgba(255,107,53,.12); color:#ff6b35; border:1px solid rgba(255,107,53,.25); }
    .tag-pt  { background:rgba(123,45,139,.12); color:#c45be5; border:1px solid rgba(123,45,139,.25); }
    .tag-rm  { background:rgba(0,78,137,.15);   color:#5bafd6; border:1px solid rgba(0,78,137,.25); }
    .tag-in  { background:rgba(249,220,92,.1);  color:#f9dc5c; border:1px solid rgba(249,220,92,.2); }
    .salary-range-row { display:flex; gap:.5rem; align-items:center; }
    .salary-range-row input { flex:1; }
    .salary-sep { color:#444; font-size:.75rem; flex-shrink:0; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent"></div>
    </div>
  </nav>

  <div class="container" id="flash-container" style="margin-top:1rem;"></div>

  <!-- Top search area -->
  <div style="background:var(--bg-primary);padding:2.5rem 0 1.5rem;">
    <div class="container">
      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:#f0ede8;margin-bottom:1.5rem;">Browse Jobs</h2>

      <!-- Search Bar -->
      <form id="searchForm">
        <div class="hp-search-bar mb-3">
          <span style="color:#444;font-size:.95rem;"><i class="bi bi-search"></i></span>
          <input class="hp-search-input" id="q" placeholder="Job title, keyword, company..." />
          <div class="hp-divider"></div>
          <span class="hp-filter-label"><i class="bi bi-geo-alt"></i></span>
          <input style="background:transparent;border:none;outline:none;color:#888;font-size:.82rem;width:130px;font-family:'DM Sans',sans-serif;" id="location" placeholder="Location..." />
          <div class="hp-divider"></div>
          <select id="type" style="background:transparent;border:none;outline:none;color:#555;font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;">
            <option value="">💼 All Types</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="remote">Remote</option>
            <option value="internship">Internship</option>
          </select>
          <button type="submit" class="hp-search-btn"><i class="bi bi-search me-1"></i>Search</button>
        </div>
      </form>

      <!-- Category Pills -->
      <div class="cat-pills mb-2">
        <a href="/browse.html" class="cat-pill" id="pill-all">All Jobs</a>
        <a href="/browse.html?type=full-time" class="cat-pill" data-type="full-time">💻 Full-time</a>
        <a href="/browse.html?type=part-time" class="cat-pill" data-type="part-time">🎨 Part-time</a>
        <a href="/browse.html?type=remote" class="cat-pill" data-type="remote">🌐 Remote</a>
        <a href="/browse.html?type=internship" class="cat-pill" data-type="internship">🎓 Internship</a>
        <a href="/browse.html?type=contract" class="cat-pill" data-type="contract">📋 Contract</a>
      </div>
    </div>
  </div>

  <!-- Main content: filter sidebar + job grid -->
  <div style="border-top:1px solid #111;" class="py-4">
    <div class="container">
      <div class="row g-4">

        <!-- Filter Sidebar -->
        <div class="col-lg-3">
          <div class="filter-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:#f0ede8;font-size:.95rem;"><i class="bi bi-funnel me-2"></i>Filters</span>
              <span id="activeFilterCount" style="font-size:.72rem;color:#ff6b35;font-weight:700;display:none;"></span>
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label class="filter-label"><i class="bi bi-grid me-1"></i>Category</label>
              <select class="filter-select" id="f-category">
                <option value="">All Categories</option>
              </select>
            </div>

            <hr class="filter-divider" />

            <!-- Job Type -->
            <div class="mb-3">
              <label class="filter-label"><i class="bi bi-briefcase me-1"></i>Job Type</label>
              <select class="filter-select" id="f-type">
                <option value="">All Types</option>
                <option value="full-time">Full-time</option>
                <option value="part-time">Part-time</option>
                <option value="contract">Contract</option>
                <option value="remote">Remote</option>
                <option value="internship">Internship</option>
              </select>
            </div>

            <hr class="filter-divider" />

            <!-- Location -->
            <div class="mb-3">
              <label class="filter-label"><i class="bi bi-geo-alt me-1"></i>Location</label>
              <select class="filter-select" id="f-location">
                <option value="">All Locations</option>
              </select>
            </div>

            <hr class="filter-divider" />

            <!-- Salary Range -->
            <div class="mb-3">
              <label class="filter-label"><i class="bi bi-currency-dollar me-1"></i>Salary Range ($/mo)</label>
              <div class="salary-range-row mb-2">
                <input type="number" class="filter-input" id="f-salary-min" placeholder="Min" min="0" step="100" />
                <span class="salary-sep">to</span>
                <input type="number" class="filter-input" id="f-salary-max" placeholder="Max" min="0" step="100" />
              </div>
              <!-- Quick salary presets -->
              <div class="d-flex flex-wrap gap-1 mt-1">
                <button type="button" class="btn btn-sm salary-preset" data-min="" data-max="" style="font-size:.68rem;padding:2px 8px;border-radius:50px;background:#0d0d0d;border:1px solid #1e1e1e;color:#666;">Any</button>
                <button type="button" class="btn btn-sm salary-preset" data-min="0" data-max="500" style="font-size:.68rem;padding:2px 8px;border-radius:50px;background:#0d0d0d;border:1px solid #1e1e1e;color:#666;">$0–500</button>
                <button type="button" class="btn btn-sm salary-preset" data-min="500" data-max="1000" style="font-size:.68rem;padding:2px 8px;border-radius:50px;background:#0d0d0d;border:1px solid #1e1e1e;color:#666;">$500–1k</button>
                <button type="button" class="btn btn-sm salary-preset" data-min="1000" data-max="3000" style="font-size:.68rem;padding:2px 8px;border-radius:50px;background:#0d0d0d;border:1px solid #1e1e1e;color:#666;">$1k–3k</button>
                <button type="button" class="btn btn-sm salary-preset" data-min="3000" data-max="" style="font-size:.68rem;padding:2px 8px;border-radius:50px;background:#0d0d0d;border:1px solid #1e1e1e;color:#666;">$3k+</button>
              </div>
            </div>

            <hr class="filter-divider" />

            <!-- Experience Level -->
            <div class="mb-3">
              <label class="filter-label"><i class="bi bi-bar-chart me-1"></i>Experience Level</label>
              <select class="filter-select" id="f-experience">
                <option value="">All Levels</option>
                <option value="entry">Entry Level</option>
                <option value="mid">Mid Level</option>
                <option value="senior">Senior Level</option>
                <option value="lead">Lead</option>
              </select>
            </div>

            <button class="btn-apply-filter" id="applyFilters"><i class="bi bi-check2 me-1"></i>Apply Filters</button>
            <button class="btn-clear-filter" id="clearFilters"><i class="bi bi-x me-1"></i>Clear All Filters</button>
          </div>
        </div>

        <!-- Job Listings -->
        <div class="col-lg-9">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 fw-bold" id="resultsLabel" style="font-family:'Space Grotesk',sans-serif;color:#f0ede8;">Loading jobs...</h5>
            <div id="activeFiltersBar" style="font-size:.75rem;color:#555;"></div>
          </div>
          <div class="row g-3" id="jobsGrid"></div>
          <div class="d-flex justify-content-center mt-4" id="paginationWrap"></div>
        </div>

      </div>
    </div>
  </div>

  <footer style="background:#0d0d0d;border-top:1px solid #111;padding:1.5rem 0;margin-top:auto;">
    <div class="container text-center" style="color:#fff;font-size:.82rem;">
      &copy; 2026 JobPortal. All rights reserved.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const cardAccents = ['jlc-orange','jlc-green','jlc-purple','jlc-blue'];
    const tagMap = { 'full-time':'tag-ft','part-time':'tag-pt','remote':'tag-rm','internship':'tag-in','contract':'tag-rm' };
    const iconBg = ['rgba(255,107,53,.12)','rgba(123,45,139,.12)','rgba(0,78,137,.15)','rgba(249,220,92,.1)'];
    const iconEmoj = ['💻','🎨','📊','📱','🏗️','📚','💰','🏥','🚀','🌐'];

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        q: p.get('q') || '',
        location: p.get('location') || '',
        type: p.get('type') || '',
        category: p.get('category') || '',
        salary_min: p.get('salary_min') || '',
        salary_max: p.get('salary_max') || '',
        experience: p.get('experience') || '',
        page: parseInt(p.get('page') || 1)
      };
    }

    function buildQS(params) {
      const p = {};
      Object.entries(params).forEach(([k,v]) => { if (v !== '' && v !== null && v !== undefined) p[k] = v; });
      return new URLSearchParams(p).toString();
    }

    async function loadMeta() {
      try {
        const data = await apiFetch('/api/jobs/meta');
        const catSel = document.getElementById('f-category');
        data.categories.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          catSel.appendChild(opt);
        });
        const locSel = document.getElementById('f-location');
        data.locations.forEach(l => {
          const opt = document.createElement('option');
          opt.value = l; opt.textContent = l;
          locSel.appendChild(opt);
        });
      } catch(e) {}
    }

    async function loadJobs(params) {
      document.getElementById('jobsGrid').innerHTML = `<div class="col-12 text-center py-5" style="color:#444;"><div class="spinner-border" style="color:#ff6b35;"></div></div>`;
      const qs = buildQS(params);
      try {
        const data = await apiFetch(`/api/jobs?${qs}`);
        renderJobs(data.jobs, data.total);
        renderPagination(data.page, data.pages, params);
        updateActiveFiltersBar(params);
      } catch (err) {
        document.getElementById('jobsGrid').innerHTML = `<div class="col-12 text-center py-5" style="color:#444;"><i class="bi bi-exclamation-circle" style="font-size:2.5rem;display:block;margin-bottom:1rem;color:#333;"></i>Failed to load jobs.</div>`;
      }
    }

    function renderJobs(jobs, total) {
      document.getElementById('resultsLabel').textContent = `${total} Job${total !== 1 ? 's' : ''} Found`;
      if (!jobs.length) {
        document.getElementById('jobsGrid').innerHTML = `<div class="col-12 text-center py-5" style="color:#444;"><i class="bi bi-search" style="font-size:2.5rem;display:block;margin-bottom:1rem;color:#333;"></i>No jobs match your filters.<br><small style="color:#333;">Try adjusting or clearing your filters.</small></div>`;
        return;
      }
      document.getElementById('jobsGrid').innerHTML = jobs.map((j,i) => `
        <div class="col-md-6 col-xl-4">
          <div class="job-list-card ${cardAccents[i%4]}" onclick="window.location='/job.html?id=${j.id}'">
            <div style="display:flex;align-items:flex-start;gap:.85rem;margin-bottom:.9rem;">
              <div style="width:42px;height:42px;border-radius:10px;background:${iconBg[i%4]};display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">${iconEmoj[i%iconEmoj.length]}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${j.title}</div>
                <div style="font-size:.75rem;color:#555;margin-top:.2rem;"><i class="bi bi-building me-1"></i>${j.company}</div>
              </div>
              <small style="color:#444;font-size:.68rem;flex-shrink:0;">${formatDate(j.created_at)}</small>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;">
              <span class="mc-tag ${tagMap[j.type]||'tag-ft'}">${j.type}</span>
              ${j.category ? `<span style="font-size:.68rem;color:#555;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:50px;padding:2px 8px;">${j.category}</span>` : ''}
              <span style="font-size:.73rem;color:#555;"><i class="bi bi-geo-alt me-1"></i>${j.location}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:.8rem;border-top:1px solid #1a1a1a;">
              <span style="font-size:.82rem;font-weight:700;color:#0de5a8;font-family:'Space Grotesk',sans-serif;">${formatSalary(j.salary_min,j.salary_max)}</span>
              <span style="font-size:.7rem;background:rgba(255,255,255,.04);border:1px solid #1e1e1e;border-radius:6px;padding:2px 8px;color:#555;">${j.experience_level}</span>
            </div>
          </div>
        </div>`).join('');
    }

    function renderPagination(page, pages, params) {
      if (pages <= 1) { document.getElementById('paginationWrap').innerHTML=''; return; }
      let html = '<nav><ul class="pagination">';
      for (let i = 1; i <= pages; i++) {
        const qs = buildQS({...params, page:i});
        html += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="/browse.html?${qs}">${i}</a></li>`;
      }
      document.getElementById('paginationWrap').innerHTML = html+'</ul></nav>';
    }

    function updateActiveFiltersBar(params) {
      const labels = [];
      if (params.category) labels.push(`Category: ${params.category}`);
      if (params.type) labels.push(`Type: ${params.type}`);
      if (params.location) labels.push(`Location: ${params.location}`);
      if (params.salary_min || params.salary_max) {
        const s = `$${params.salary_min||0}${params.salary_max ? '–$'+params.salary_max : '+'}`;
        labels.push(`Salary: ${s}`);
      }
      if (params.experience) labels.push(`Level: ${params.experience}`);
      if (params.q) labels.push(`"${params.q}"`);

      const bar = document.getElementById('activeFiltersBar');
      const count = document.getElementById('activeFilterCount');
      const filterCount = labels.length;
      if (filterCount) {
        bar.innerHTML = labels.map(l => `<span style="background:#1a1a1a;border:1px solid #222;border-radius:50px;padding:2px 10px;margin-left:4px;">${l}</span>`).join('');
        count.textContent = `${filterCount} active`;
        count.style.display = 'inline';
      } else {
        bar.innerHTML = '';
        count.style.display = 'none';
      }
    }

    // Search form (top bar)
    document.getElementById('searchForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const current = getParams();
      const qs = buildQS({
        ...current,
        q: document.getElementById('q').value,
        location: document.getElementById('location').value,
        type: document.getElementById('type').value,
        page: 1
      });
      window.location.href = `/browse.html?${qs}`;
    });

    // Sidebar apply filters
    document.getElementById('applyFilters').addEventListener('click', () => {
      const current = getParams();
      const qs = buildQS({
        q: current.q,
        location: document.getElementById('f-location').value,
        type: document.getElementById('f-type').value,
        category: document.getElementById('f-category').value,
        salary_min: document.getElementById('f-salary-min').value,
        salary_max: document.getElementById('f-salary-max').value,
        experience: document.getElementById('f-experience').value,
        page: 1
      });
      window.location.href = `/browse.html?${qs}`;
    });

    // Clear filters
    document.getElementById('clearFilters').addEventListener('click', () => {
      window.location.href = '/browse.html';
    });

    // Salary presets
    document.querySelectorAll('.salary-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('f-salary-min').value = btn.dataset.min;
        document.getElementById('f-salary-max').value = btn.dataset.max;
        document.querySelectorAll('.salary-preset').forEach(b => b.style.borderColor = '#1e1e1e');
        btn.style.borderColor = '#ff6b35';
      });
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const params = getParams();

      // Populate top search bar
      document.getElementById('q').value = params.q;
      document.getElementById('location').value = params.location;
      document.getElementById('type').value = params.type;

      // Highlight active pill
      document.querySelectorAll('.cat-pill').forEach(p => {
        p.classList.remove('active');
        const pType = p.dataset.type || '';
        if (pType === params.type) p.classList.add('active');
        if (!params.type && p.id === 'pill-all') p.classList.add('active');
      });

      // Load meta (categories + locations) then set sidebar values
      await loadMeta();
      document.getElementById('f-type').value = params.type;
      document.getElementById('f-category').value = params.category;
      document.getElementById('f-location').value = params.location;
      document.getElementById('f-salary-min').value = params.salary_min;
      document.getElementById('f-salary-max').value = params.salary_max;
      document.getElementById('f-experience').value = params.experience;

      loadJobs(params);
    });
  </script>
</body>
</html>
