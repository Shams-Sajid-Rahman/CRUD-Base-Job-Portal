<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="collapse navbar-collapse" id="navbarContent"></div>
    </div>
  </nav>

  <div class="container mt-3" id="flash-container"></div>

  <section class="py-5" style="min-height:calc(100vh - 64px);display:flex;align-items:center;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="auth-card card">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="auth-logo mb-3">
                  <img src="/img/job.png" style="height:36px;width:36px;object-fit:contain;" />
                </div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted small">Join JobPortal today — it's free</p>
              </div>

              <!-- Role Tabs -->
              <div class="role-tabs mb-4">
                <button type="button" class="role-tab-btn active" data-role="seeker" onclick="setRoleTab('seeker',this)">
                  <i class="bi bi-person me-1"></i>Job Seeker
                </button>
                <button type="button" class="role-tab-btn" data-role="employer" onclick="setRoleTab('employer',this)">
                  <i class="bi bi-building me-1"></i>Employer
                </button>
              </div>

              <form id="registerForm" novalidate>
                <input type="hidden" id="roleInput" value="seeker" />

                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-person"></i></span>
                      <input type="text" class="form-control" id="name" placeholder="John Doe" required autofocus />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                      <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
                    </div>
                  </div>

                  <div class="col-12">
                    <label class="form-label">National ID (NID) Number <span style="color:var(--c6);">*</span></label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-credit-card-2-front"></i></span>
                      <input type="text" class="form-control" id="nid_number" placeholder="10 or 17-digit NID number" pattern="^\d{10}(\d{7})?$" maxlength="17" required />
                    </div>
                    <div class="form-text"><i class="bi bi-info-circle me-1"></i>Must be a valid 10 or 17-digit NID.</div>
                  </div>

                  <div class="col-12">
                    <label class="form-label">NID Photo / Scan <span style="color:var(--c6);">*</span></label>
                    <div class="nid-upload-area" onclick="document.getElementById('nid_image').click()">
                      <div id="nidPlaceholder">
                        <i class="bi bi-cloud-arrow-up fs-2" style="color:#555;"></i>
                        <p class="mb-1 fw-medium mt-2" style="color:#aaa;">Click to upload NID image</p>
                        <p class="small mb-0" style="color:#555;">JPG, PNG, WEBP or PDF — max 5MB</p>
                      </div>
                      <div id="nidPreviewWrap" style="display:none;">
                        <img id="nidPreviewImg" src="" alt="NID Preview" class="nid-preview-img" />
                        <p id="nidFileName" class="small mt-2 mb-0" style="color:#888;"></p>
                      </div>
                    </div>
                    <input type="file" class="d-none" id="nid_image" accept=".jpg,.jpeg,.png,.webp,.pdf" required onchange="previewNID(this)" />
                  </div>

                  <div class="col-12" id="companyField" style="display:none;">
                    <label class="form-label">Company Name</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-building"></i></span>
                      <input type="text" class="form-control" id="company_name" placeholder="Your company name" />
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-lock"></i></span>
                      <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required />
                      <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password',this)"><i class="bi bi-eye"></i></button>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                      <input type="password" class="form-control" id="confirm_password" placeholder="Repeat password" required />
                    </div>
                  </div>

                  <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="registerBtn">
                      <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                  </div>
                </div>
              </form>

              <hr class="my-4" />
              <p class="text-center text-muted small mb-0">
                Already have an account? <a href="/login.html" style="color:var(--c1);font-weight:600;">Sign in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    function setRoleTab(role, btn) {
      document.querySelectorAll('.role-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('roleInput').value = role;
      document.getElementById('companyField').style.display = role === 'employer' ? 'block' : 'none';
    }

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { input.type = 'password'; icon.className = 'bi bi-eye'; }
    }

    function previewNID(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('nidFileName').textContent = file.name;
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('nidPreviewImg').src = e.target.result;
          document.getElementById('nidPreviewImg').style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        document.getElementById('nidPreviewImg').style.display = 'none';
      }
      document.getElementById('nidPlaceholder').style.display = 'none';
      document.getElementById('nidPreviewWrap').style.display = 'block';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('email', document.getElementById('email').value);
      formData.append('password', document.getElementById('password').value);
      formData.append('confirm_password', document.getElementById('confirm_password').value);
      formData.append('role', document.getElementById('roleInput').value);
      formData.append('nid_number', document.getElementById('nid_number').value);
      formData.append('company_name', document.getElementById('company_name').value);
      const nidFile = document.getElementById('nid_image').files[0];
      if (nidFile) formData.append('nid_image', nidFile);

      try {
        const data = await apiFetch('/api/auth/register', { method: 'POST', body: formData });
        if (data.user.role === 'employer') window.location.href = '/employer/dashboard.html';
        else window.location.href = '/seeker/dashboard.html';
      } catch (err) {
        showAlert(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
      }
    });
  </script>
</body>
</html>
