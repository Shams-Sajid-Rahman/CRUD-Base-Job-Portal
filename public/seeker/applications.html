<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2" id="navbarContent"></div>
    </div>
  </nav>
  <div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);width:420px;z-index:9999;" id="flash-container"></div>

  <div class="dash-wrap">
    <div class="dash-sidebar">
      <div class="dash-sidebar-title text-gradient">My Portal</div>
      <div class="dash-sidebar-sub">Job Seeker</div>

      <div class="sidebar-label">Overview</div>
      <a href="/seeker/dashboard.html" class="sidebar-item"><i class="bi bi-grid"></i> Dashboard</a>

      <div class="sidebar-label">Activity</div>
      <a href="/seeker/applications.html" class="sidebar-item" id="nav-all"><i class="bi bi-file-text"></i> Total Applied</a>
      <a href="/seeker/applications.html?status=pending" class="sidebar-item" id="nav-pending"><i class="bi bi-clock"></i> Pending</a>
      <a href="/seeker/applications.html?status=shortlisted" class="sidebar-item" id="nav-shortlisted"><i class="bi bi-star"></i> Shortlisted</a>
      <a href="/seeker/applications.html?status=hired" class="sidebar-item" id="nav-hired"><i class="bi bi-check-circle"></i> Hired</a>

      <div class="sidebar-label">Account</div>
      <a href="#" onclick="doLogout()" class="sidebar-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="dash-main">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-gradient" id="pageTitle">My Applications</h3>
        <a href="/browse.html" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>Browse Jobs</a>
      </div>
      <div class="card">
        <div class="card-body p-0" id="appContent">
          <div class="text-center py-5 text-muted"><div class="spinner-border"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    async function loadApplications() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'seeker') { window.location.href = '/login.html'; return; }
      const statusFilter = new URLSearchParams(window.location.search).get('status');
      const navMap = { '': 'nav-all', pending: 'nav-pending', shortlisted: 'nav-shortlisted', hired: 'nav-hired' };
      const activeNav = document.getElementById(navMap[statusFilter || ''] || 'nav-all');
      if (activeNav) activeNav.classList.add('active', 'si-orange');
      if (statusFilter) {
        const labels = { pending:'Pending', shortlisted:'Shortlisted', hired:'Hired', rejected:'Rejected', reviewed:'Reviewed' };
        document.getElementById('pageTitle').textContent = (labels[statusFilter] || statusFilter) + ' Applications';
        document.title = (labels[statusFilter] || statusFilter) + ' Applications | JobPortal';
      }
      try {
        const { applications: all } = await apiFetch('/api/seeker/applications');
        const applications = statusFilter ? all.filter(a => a.status === statusFilter) : all;
        if (!applications.length) {
          document.getElementById('appContent').innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-3"></i><p>No applications yet.</p><a href="/browse.html" class="btn btn-primary">Browse Jobs</a></div>`;
          return;
        }
        document.getElementById('appContent').innerHTML = `
          <table class="table table-hover mb-0">
            <thead><tr><th>Job</th><th>Company</th><th>Location</th><th>Salary</th><th>Status</th><th>Applied</th><th></th></tr></thead>
            <tbody id="appRows"></tbody>
          </table>`;
        document.getElementById('appRows').innerHTML = applications.map(a => `
          <tr>
            <td><a href="/job.html?id=${a.job_id}" class="fw-medium text-decoration-none">${a.title}</a></td>
            <td class="text-muted">${a.company}</td>
            <td class="text-muted small">${a.location}</td>
            <td class="text-muted small">${formatSalary(a.salary_min, a.salary_max)}</td>
            <td><span class="badge bg-${badgeColor(a.status)}">${a.status}</span></td>
            <td class="text-muted small">${formatDate(a.created_at)}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="withdraw(${a.id}, this)"><i class="bi bi-x-circle me-1"></i>Withdraw</button></td>
          </tr>`).join('');
      } catch (err) {
        showAlert(err.message);
      }
    }

    async function withdraw(id, btn) {
      if (!confirm('Withdraw this application?')) return;
      btn.disabled = true;
      try {
        await apiFetch(`/api/seeker/applications/${id}`, { method: 'DELETE' });
        showAlert('Application withdrawn.', 'success');
        loadApplications();
      } catch (err) {
        showAlert(err.message);
        btn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', loadApplications);
  </script>
</body>
</html>
