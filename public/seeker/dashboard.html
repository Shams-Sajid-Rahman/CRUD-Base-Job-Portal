<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeker Dashboard | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2" id="navbarContent"></div>
    </div>
  </nav>
  <div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);width:420px;z-index:9999;" id="flash-container"></div>

  <div class="dash-wrap">
    <div class="dash-sidebar">
      <div class="dash-sidebar-title text-gradient">My Portal</div>
      <div class="dash-sidebar-sub">Job Seeker</div>

      <div class="sidebar-label">Overview</div>
      <a href="/seeker/dashboard.html" class="sidebar-item active si-orange"><i class="bi bi-grid"></i> Dashboard</a>

      <div class="sidebar-label">Activity</div>
      <a href="/seeker/applications.html" class="sidebar-item"><i class="bi bi-file-text"></i> Total Applied</a>
      <a href="/seeker/applications.html?status=pending" class="sidebar-item"><i class="bi bi-clock"></i> Pending</a>
      <a href="/seeker/applications.html?status=shortlisted" class="sidebar-item"><i class="bi bi-star"></i> Shortlisted</a>
      <a href="/seeker/applications.html?status=hired" class="sidebar-item"><i class="bi bi-check-circle"></i> Hired</a>

      <div class="sidebar-label">Account</div>
      <a href="#" onclick="doLogout()" class="sidebar-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="dash-main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-0 text-gradient" id="welcomeMsg">Dashboard</h3>
          <p class="text-muted small mb-0">Here's your job search overview</p>
        </div>
        <a href="/browse.html" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>Browse Jobs</a>
      </div>

      <div class="row g-3 mb-5" id="statsRow">
        <div class="col-12 text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>
      </div>

      <h5 class="fw-semibold mb-3">Recent Applications</h5>
      <div class="card mb-5">
        <div class="card-body p-0">
          <div class="table-responsive" id="appTable">
            <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Latest Job Openings</h5>
        <a href="/browse.html" class="small" style="color:var(--c1);">View all</a>
      </div>
      <div class="row g-3" id="recentJobsGrid">
        <div class="col-12 text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    async function loadDashboard() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'seeker') { window.location.href = '/login.html'; return; }
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;

      try {
        const { applications, stats, recentJobs } = await apiFetch('/api/seeker/dashboard');

        const seekerStats = [
          { val: stats.total||0,       lbl:'Total Applied', accent:'sc-orange', link:'/seeker/applications.html' },
          { val: stats.pending||0,     lbl:'Pending',       accent:'sc-yellow', link:'/seeker/applications.html?status=pending' },
          { val: stats.shortlisted||0, lbl:'Shortlisted',   accent:'sc-purple', link:'/seeker/applications.html?status=shortlisted' },
          { val: stats.hired||0,       lbl:'Hired',         accent:'sc-green',  link:'/seeker/applications.html?status=hired' },
        ];
        document.getElementById('statsRow').innerHTML = seekerStats.map(s => `
          <div class="col-6 col-md-3">
            <a href="${s.link}" class="text-decoration-none">
              <div class="card stat-card ${s.accent} p-3 text-center" style="cursor:pointer;transition:transform .18s,box-shadow .18s;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.4)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
                <div class="stat-num">${s.val}</div>
                <div class="stat-lbl">${s.lbl}</div>
              </div>
            </a>
          </div>`).join('');

        if (!applications.length) {
          document.getElementById('appTable').innerHTML = `<div class="text-center py-4 text-muted"><i class="bi bi-inbox fs-2 d-block mb-2"></i>No applications yet. <a href="/browse.html">Browse jobs</a></div>`;
        } else {
          document.getElementById('appTable').innerHTML = `
            <table class="table table-hover mb-0">
              <thead><tr><th>Job</th><th>Company</th><th>Type</th><th>Status</th><th>Applied</th></tr></thead>
              <tbody>${applications.map(a => `
                <tr onclick="window.location='/job.html?id=${a.job_id}'" style="cursor:pointer;">
                  <td class="fw-medium">${a.title}</td>
                  <td class="text-muted">${a.company}</td>
                  <td><span class="type-badge type-${a.type.replace(' ','-')}">${a.type}</span></td>
                  <td><span class="badge rounded-pill status-${a.status}" style="font-size:.7rem;padding:3px 10px;">${a.status}</span></td>
                  <td class="text-muted small">${formatDate(a.created_at)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
            <div class="p-3 text-end"><a href="/seeker/applications.html" class="small" style="color:var(--c1);">View all applications →</a></div>`;
        }

        document.getElementById('recentJobsGrid').innerHTML = recentJobs.map(j => `
          <div class="col-md-6 col-lg-4">
            <div class="card job-card h-100" onclick="window.location='/job.html?id=${j.id}'" style="cursor:pointer;">
              <div class="card-body p-3">
                <h6 class="fw-semibold mb-1">${j.title}</h6>
                <p class="text-muted small mb-1"><i class="bi bi-building me-1"></i>${j.company}</p>
                <p class="text-muted small mb-0"><i class="bi bi-geo-alt me-1"></i>${j.location}</p>
              </div>
            </div>
          </div>`).join('');
      } catch (err) {
        showAlert(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
