<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2" id="navbarContent"></div>
    </div>
  </nav>
  <div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);width:420px;z-index:9999;" id="flash-container"></div>

  <div class="dash-wrap">
    <div class="dash-sidebar">
      <div class="dash-sidebar-title text-gradient">Admin Panel</div>
      <div class="dash-sidebar-sub">Manage Platform</div>

      <div class="sidebar-label">Overview</div>
      <a href="/admin/dashboard.html" class="sidebar-item active si-admin"><i class="bi bi-grid"></i> Dashboard</a>

      <div class="sidebar-label">Manage</div>
      <a href="/admin/users.html" class="sidebar-item"><i class="bi bi-people"></i> Users</a>
      <a href="/admin/jobs.html" class="sidebar-item"><i class="bi bi-briefcase"></i> Jobs</a>
      <a href="/admin/applications.html" class="sidebar-item"><i class="bi bi-file-text"></i> Applications</a>

      <div class="sidebar-label">Account</div>
      <a href="#" onclick="doLogout()" class="sidebar-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="dash-main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-1 text-gradient">Admin Overview</h3>
          <p class="text-muted small mb-0">Platform statistics and recent activity</p>
        </div>
      </div>

      <div class="row g-3 mb-5" id="statsRow">
        <div class="col-12 text-center py-4"><div class="spinner-border"></div></div>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <h5 class="fw-bold mb-3">Recent Users</h5>
          <div class="card"><div class="card-body p-0" id="usersTable"></div></div>
        </div>
        <div class="col-md-6">
          <h5 class="fw-bold mb-3">Recent Jobs</h5>
          <div class="card"><div class="card-body p-0" id="jobsTable"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const statDefs = [
      { key:'seekers',           label:'Seekers',      accent:'sc-blue',   icon:'bi-person',       link:'/admin/users.html?role=seeker&label=Seekers' },
      { key:'employers',         label:'Employers',    accent:'sc-purple', icon:'bi-building',     link:'/admin/users.html?role=employer&label=Employers' },
      { key:'active_jobs',       label:'Active Jobs',  accent:'sc-green',  icon:'bi-briefcase',    link:'/admin/jobs.html?status=active&label=Active+Jobs' },
      { key:'total_applications',label:'Applications', accent:'sc-orange', icon:'bi-file-text',    link:'/admin/applications.html' },
      { key:'total_jobs',        label:'Total Jobs',   accent:'sc-yellow', icon:'bi-collection',   link:'/admin/jobs.html?label=Total+Jobs' },
      { key:'hired',             label:'Hired',        accent:'sc-green',  icon:'bi-check-circle', link:'/admin/applications.html?status=hired' },
    ];

    async function loadDashboard() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'admin') { window.location.href = '/login.html'; return; }
      try {
        const { stats, recentUsers, recentJobs } = await apiFetch('/api/admin/dashboard');

        document.getElementById('statsRow').innerHTML = statDefs.map(s => `
          <div class="col-6 col-md-4 col-lg-2">
            <a href="${s.link}" class="text-decoration-none">
              <div class="card stat-card ${s.accent} p-3" style="cursor:pointer;transition:transform .18s,box-shadow .18s;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.4)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
                <i class="bi ${s.icon} stat-icon text-muted"></i>
                <div class="stat-num">${stats[s.key] || 0}</div>
                <div class="stat-lbl">${s.label}</div>
              </div>
            </a>
          </div>`).join('');

        document.getElementById('usersTable').innerHTML = `
          <table class="table table-sm mb-0">
            <thead><tr><th>Name</th><th>Role</th><th>Joined</th></tr></thead>
            <tbody>${recentUsers.map(u => `
              <tr>
                <td class="fw-medium">${u.name}<br><small class="text-muted">${u.email}</small></td>
                <td><span class="badge rounded-pill role-${u.role}" style="font-size:.68rem;padding:3px 9px;">${u.role}</span></td>
                <td class="text-muted small">${formatDate(u.created_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
          <div class="p-2 text-end"><a href="/admin/users.html" class="small" style="color:var(--c1);">View all users →</a></div>`;

        document.getElementById('jobsTable').innerHTML = `
          <table class="table table-sm mb-0">
            <thead><tr><th>Job</th><th>Status</th><th>Posted</th></tr></thead>
            <tbody>${recentJobs.map(j => `
              <tr>
                <td class="fw-medium">${j.title}<br><small class="text-muted">${j.company}</small></td>
                <td><span class="badge rounded-pill status-${j.status}" style="font-size:.68rem;padding:3px 9px;">${j.status}</span></td>
                <td class="text-muted small">${formatDate(j.created_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
          <div class="p-2 text-end"><a href="/admin/jobs.html" class="small" style="color:var(--c1);">View all jobs →</a></div>`;
      } catch (err) {
        showAlert(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
