<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2" id="navbarContent"></div>
    </div>
  </nav>
  <div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);width:420px;z-index:9999;" id="flash-container"></div>

  <div class="dash-wrap">
    <div class="dash-sidebar">
      <div class="dash-sidebar-title text-gradient">Admin Panel</div>
      <div class="dash-sidebar-sub">Manage Platform</div>

      <div class="sidebar-label">Overview</div>
      <a href="/admin/dashboard.html" class="sidebar-item"><i class="bi bi-grid"></i> Dashboard</a>

      <div class="sidebar-label">Manage</div>
      <a href="/admin/users.html" class="sidebar-item active si-admin"><i class="bi bi-people"></i> Users</a>
      <a href="/admin/jobs.html" class="sidebar-item"><i class="bi bi-briefcase"></i> Jobs</a>
      <a href="/admin/applications.html" class="sidebar-item"><i class="bi bi-file-text"></i> Applications</a>

      <div class="sidebar-label">Account</div>
      <a href="#" onclick="doLogout()" class="sidebar-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="dash-main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-gradient" id="pageTitle">Manage Users</h3>
      </div>

      <div class="card mb-3">
        <div class="card-body py-2 px-3">
          <div class="row g-2">
            <div class="col-md-5">
              <input type="text" class="form-control" id="searchQ" placeholder="Search name or email..." oninput="loadUsers()" />
            </div>
            <div class="col-md-3">
              <select class="form-select" id="roleFilter" onchange="loadUsers()">
                <option value="">All Roles</option>
                <option value="seeker">Seekers</option>
                <option value="employer">Employers</option>
                <option value="admin">Admins</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0" id="usersContent">
          <div class="text-center py-5"><div class="spinner-border"></div></div>
        </div>
      </div>
      <div class="d-flex justify-content-center mt-3" id="paginationWrap"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    let currentPage = 1;

    async function loadUsers(page = 1) {
      currentPage = page;
      const q    = document.getElementById('searchQ').value;
      const role = document.getElementById('roleFilter').value;
      try {
        const { users, pages } = await apiFetch(`/api/admin/users?q=${encodeURIComponent(q)}&role=${role}&page=${page}`);
        if (!users.length) {
          document.getElementById('usersContent').innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-people fs-1 d-block mb-3"></i>No users found.</div>`;
          document.getElementById('paginationWrap').innerHTML = '';
          return;
        }
        document.getElementById('usersContent').innerHTML = `
          <table class="table table-hover mb-0">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>NID</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>${users.map(u => `
              <tr>
                <td class="fw-medium">${u.name}</td>
                <td class="text-muted small">${u.email}</td>
                <td>
                  <select class="form-select form-select-sm" style="width:110px;" onchange="changeRole(${u.id}, this.value, this)">
                    ${['seeker','employer','admin'].map(r => `<option ${u.role===r?'selected':''}>${r}</option>`).join('')}
                  </select>
                </td>
                <td class="text-muted small">${u.nid_number || '—'}</td>
                <td class="text-muted small">${formatDate(u.created_at)}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id}, this)"><i class="bi bi-trash"></i></button></td>
              </tr>`).join('')}
            </tbody>
          </table>`;
        let pg = '';
        for (let i = 1; i <= pages; i++)
          pg += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadUsers(${i});return false;">${i}</a></li>`;
        document.getElementById('paginationWrap').innerHTML = pages > 1 ? `<nav><ul class="pagination">${pg}</ul></nav>` : '';
      } catch (err) { showAlert(err.message); }
    }

    async function changeRole(id, role, select) {
      select.disabled = true;
      try {
        await apiFetch(`/api/admin/users/${id}/role`, { method:'PUT', body:JSON.stringify({ role }) });
        showAlert('Role updated.', 'success');
      } catch (err) { showAlert(err.message); }
      select.disabled = false;
    }

    async function deleteUser(id, btn) {
      if (!confirm('Delete this user? This cannot be undone.')) return;
      btn.disabled = true;
      try {
        await apiFetch(`/api/admin/users/${id}`, { method:'DELETE' });
        showAlert('User deleted.', 'success');
        loadUsers(currentPage);
      } catch (err) { showAlert(err.message); btn.disabled = false; }
    }

    async function init() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'admin') { window.location.href = '/login.html'; return; }
      const params = new URLSearchParams(window.location.search);
      const role  = params.get('role');
      const label = params.get('label');
      if (role) document.getElementById('roleFilter').value = role;
      if (label) {
        document.getElementById('pageTitle').textContent = label;
        document.title = label + ' | JobPortal';
      }
      loadUsers();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
