<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Detail | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="main-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:36px;width:36px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent"></div>
    </div>
  </nav>
  <div class="container mt-3" id="flash-container"></div>

  <section class="py-5">
    <div class="container" id="jobContent">
      <div class="text-center py-5 text-muted"><div class="spinner-border"></div></div>
    </div>
  </section>

  <style>
    .cv-upload-area { border:2px dashed #dee2e6; border-radius:10px; padding:20px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; }
    .cv-upload-area:hover { border-color:#0d6efd; background:rgba(13,110,253,.04); }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    function showCVName(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('cvFileName').textContent = file.name;
      document.getElementById('cvPlaceholder').style.display = 'none';
      document.getElementById('cvSelected').style.display = 'block';
    }

    const jobId = new URLSearchParams(window.location.search).get('id');

    async function loadJob() {
      if (!jobId) { window.location.href = '/index.html'; return; }
      try {
        const { job, alreadyApplied, similar } = await apiFetch(`/api/jobs/${jobId}`);
        document.title = `${job.title} | JobPortal`;
        const user = await getCurrentUser();
        const isSeeker = user?.role === 'seeker';

        document.getElementById('jobContent').innerHTML = `
          <div class="row g-4">
            <div class="col-lg-8">
              <div class="card mb-4">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                      <h2 class="fw-bold mb-1">${job.title}</h2>
                      <p class="text-muted mb-0"><i class="bi bi-building me-1"></i>${job.company} &bull; <i class="bi bi-geo-alt me-1"></i>${job.location}</p>
                    </div>
                    <span class="badge bg-${badgeColor(job.status)} fs-6">${job.status}</span>
                  </div>
                  <div class="d-flex flex-wrap gap-2 mb-4">
                    <span class="badge bg-primary-subtle text-primary px-3 py-2">${job.type}</span>
                    <span class="badge bg-secondary-subtle text-secondary px-3 py-2">${job.experience_level}</span>
                    <span class="badge bg-success-subtle text-success px-3 py-2"><i class="bi bi-currency-dollar me-1"></i>${formatSalary(job.salary_min, job.salary_max)}</span>
                  </div>
                  <h5 class="fw-semibold">Description</h5>
                  <p class="text-muted">${job.description}</p>
                  ${job.requirements ? `<h5 class="fw-semibold mt-3">Requirements</h5><p class="text-muted">${job.requirements}</p>` : ''}
                  ${job.benefits ? `<h5 class="fw-semibold mt-3">Benefits</h5><p class="text-muted">${job.benefits}</p>` : ''}
                </div>
              </div>

              ${isSeeker && job.status === 'active' ? `
              <div class="card">
                <div class="card-body p-4">
                  <h5 class="fw-semibold mb-3">${alreadyApplied ? 'Already Applied' : 'Apply for this Job'}</h5>
                  ${alreadyApplied
                    ? '<div class="alert alert-success mb-0"><i class="bi bi-check-circle me-2"></i>You have already applied for this position.</div>'
                    : `<form id="applyForm">
                        <div class="mb-3">
                          <label class="form-label fw-medium">Cover Letter <span class="text-muted small">(optional)</span></label>
                          <textarea class="form-control" id="cover_letter" rows="4" placeholder="Tell the employer why you're a great fit..."></textarea>
                        </div>
                        <div class="mb-4">
                          <label class="form-label fw-medium">Upload CV / Resume <span class="text-muted small">(optional)</span></label>
                          <div class="cv-upload-area" id="cvUploadArea" onclick="document.getElementById('cv_file').click()">
                            <div id="cvPlaceholder">
                              <i class="bi bi-file-earmark-arrow-up fs-2 text-muted"></i>
                              <p class="mb-1 fw-medium">Click to upload your CV</p>
                              <p class="text-muted small mb-0">PDF, DOC or DOCX &mdash; max 10MB</p>
                            </div>
                            <div id="cvSelected" style="display:none;">
                              <i class="bi bi-file-earmark-check fs-2 text-success"></i>
                              <p class="mb-0 fw-medium" id="cvFileName"></p>
                              <p class="text-muted small mb-0">Click to change file</p>
                            </div>
                          </div>
                          <input type="file" class="d-none" id="cv_file" accept=".pdf,.doc,.docx" onchange="showCVName(this)" />
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="applyBtn">
                          <i class="bi bi-send me-2"></i>Submit Application
                        </button>
                       </form>`
                  }
                </div>
              </div>` : ''}

              ${!user ? `<div class="card"><div class="card-body p-4 text-center">
                <p class="mb-3 text-muted">Sign in as a Job Seeker to apply</p>
                <a href="/login.html" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In to Apply</a>
              </div></div>` : ''}
            </div>

            <div class="col-lg-4">
              <div class="card mb-4">
                <div class="card-body p-4">
                  <h6 class="fw-semibold mb-3">About the Employer</h6>
                  <p class="fw-medium mb-1">${job.employer_name}</p>
                  ${job.company_name ? `<p class="text-muted small mb-1"><i class="bi bi-building me-1"></i>${job.company_name}</p>` : ''}
                  ${job.company_website ? `<a href="${job.company_website}" target="_blank" class="text-primary small"><i class="bi bi-link me-1"></i>Website</a>` : ''}
                  ${job.employer_bio ? `<p class="text-muted small mt-2 mb-0">${job.employer_bio}</p>` : ''}
                </div>
              </div>
              <div class="card mb-4">
                <div class="card-body p-4">
                  <h6 class="fw-semibold mb-3">Job Details</h6>
                  <div class="d-flex flex-column gap-2 text-muted small">
                    <div><i class="bi bi-calendar me-2"></i>Posted ${formatDate(job.created_at)}</div>
                    <div><i class="bi bi-briefcase me-2"></i>${job.type}</div>
                    <div><i class="bi bi-bar-chart me-2"></i>${job.experience_level} level</div>
                    <div><i class="bi bi-currency-dollar me-2"></i>${formatSalary(job.salary_min, job.salary_max)}</div>
                  </div>
                </div>
              </div>
              ${similar.length ? `
              <div class="card">
                <div class="card-body p-4">
                  <h6 class="fw-semibold mb-3">Similar Jobs</h6>
                  ${similar.map(s => `<a href="/job.html?id=${s.id}" class="d-block text-decoration-none mb-3">
                    <div class="fw-medium">${s.title}</div>
                    <div class="text-muted small">${s.company} &bull; ${s.location}</div>
                  </a>`).join('')}
                </div>
              </div>` : ''}
            </div>
          </div>`;

        // Attach apply form handler
        const applyForm = document.getElementById('applyForm');
        if (applyForm) {
          applyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('applyBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';
            const formData = new FormData();
            formData.append('cover_letter', document.getElementById('cover_letter').value);
            const cvFile = document.getElementById('cv_file').files[0];
            if (cvFile) formData.append('cv_file', cvFile);
            try {
              const data = await apiFetch(`/api/seeker/apply/${jobId}`, { method: 'POST', body: formData });
              showAlert(data.message, 'success');
              setTimeout(() => window.location.reload(), 1500);
            } catch (err) {
              showAlert(err.message);
              btn.disabled = false;
              btn.innerHTML = '<i class="bi bi-send me-2"></i>Submit Application';
            }
          });
        }
      } catch (err) {
        document.getElementById('jobContent').innerHTML = `<div class="text-center py-5 text-muted"><p>${err.message}</p><a href="/browse.html" class="btn btn-primary">Back to Jobs</a></div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadJob);
  </script>
</body>
</html>
