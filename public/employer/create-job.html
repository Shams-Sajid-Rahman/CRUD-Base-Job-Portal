<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Job | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container-fluid px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:34px;width:34px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2" id="navbarContent"></div>
    </div>
  </nav>
  <div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);width:420px;z-index:9999;" id="flash-container"></div>

  <div class="dash-wrap">
    <div class="dash-sidebar">
      <div class="dash-sidebar-title text-gradient-green">Employer</div>
      <div class="dash-sidebar-sub">Manage Platform</div>

      <div class="sidebar-label">Overview</div>
      <a href="/employer/dashboard.html" class="sidebar-item"><i class="bi bi-grid"></i> Dashboard</a>

      <div class="sidebar-label">Jobs</div>
      <a href="/employer/create-job.html" class="sidebar-item active si-green"><i class="bi bi-plus-circle"></i> Post Job</a>

      <div class="sidebar-label">My Jobs</div>
      <a href="/employer/dashboard.html?filter=total&label=Total+Jobs" class="sidebar-item"><i class="bi bi-briefcase"></i> Total Jobs</a>
      <a href="/employer/dashboard.html?filter=active&label=Active+Jobs" class="sidebar-item"><i class="bi bi-check-circle"></i> Active</a>
      <a href="/employer/dashboard.html?filter=closed&label=Closed+Jobs" class="sidebar-item"><i class="bi bi-x-circle"></i> Closed</a>
      <a href="/employer/dashboard.html?filter=apps&label=Applications" class="sidebar-item"><i class="bi bi-people"></i> Applications</a>

      <div class="sidebar-label">Account</div>
      <a href="#" onclick="doLogout()" class="sidebar-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <div class="dash-main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0 text-gradient-green">Post a New Job</h3>
      </div>
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <div class="card">
            <div class="card-body p-4">
              <form id="createJobForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Job Title *</label>
                    <input type="text" class="form-control" name="title" placeholder="e.g. Senior Developer" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Company Name *</label>
                    <input type="text" class="form-control" name="company" placeholder="e.g. Acme Corp" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Location *</label>
                    <input type="text" class="form-control" name="location" placeholder="e.g. Dhaka, Bangladesh" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Job Type *</label>
                    <select class="form-select" name="type" required>
                      <option value="">Select type</option>
                      <option value="full-time">Full-time</option>
                      <option value="part-time">Part-time</option>
                      <option value="contract">Contract</option>
                      <option value="remote">Remote</option>
                      <option value="internship">Internship</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Min Salary ($)</label>
                    <input type="number" class="form-control" name="salary_min" placeholder="e.g. 30000" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Max Salary ($)</label>
                    <input type="number" class="form-control" name="salary_max" placeholder="e.g. 60000" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Experience Level</label>
                    <select class="form-select" name="experience_level">
                      <option value="any">Any</option>
                      <option value="entry">Entry</option>
                      <option value="mid">Mid</option>
                      <option value="senior">Senior</option>
                      <option value="lead">Lead</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-medium">Status</label>
                    <select class="form-select" name="status">
                      <option value="active">Active</option>
                      <option value="draft">Draft</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-medium">Job Description *</label>
                    <textarea class="form-control" name="description" rows="5" placeholder="Describe the role, responsibilities..." required></textarea>
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-medium">Requirements</label>
                    <textarea class="form-control" name="requirements" rows="4" placeholder="List required skills and qualifications..."></textarea>
                  </div>
                  <div class="col-12">
                    <label class="form-label fw-medium">Benefits</label>
                    <textarea class="form-control" name="benefits" rows="3" placeholder="Health insurance, remote work, etc..."></textarea>
                  </div>
                  <div class="col-12 d-flex gap-2 justify-content-end">
                    <a href="/employer/dashboard.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success px-4" id="submitBtn">
                      <i class="bi bi-send me-2"></i>Post Job
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    async function init() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'employer') { window.location.href = '/login.html'; return; }
    }

    document.getElementById('createJobForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Posting...';
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      try {
        await apiFetch('/api/employer/jobs', { method: 'POST', body: JSON.stringify(body) });
        showAlert('Job posted successfully!', 'success');
        setTimeout(() => window.location.href = '/employer/dashboard.html', 1200);
      } catch (err) {
        showAlert(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-2"></i>Post Job';
      }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
