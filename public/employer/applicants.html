<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicants | JobPortal</title>
  <link rel="icon" href="/img/job.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="main-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/index.html">
        <img src="/img/job.png" alt="JobPortal" style="height:36px;width:36px;object-fit:contain;" />
        Job<span class="brand-accent">Portal</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent"></div>
    </div>
  </nav>
  <div class="container mt-3" id="flash-container"></div>

  <section class="py-5">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-0" id="pageTitle">Applicants</h3>
          <p class="text-muted small mb-0" id="pageSubtitle"></p>
        </div>
        <a href="/employer/dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
      </div>
      <div class="card">
        <div class="card-body p-0" id="appContent">
          <div class="text-center py-5"><div class="spinner-border"></div></div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const jobId = new URLSearchParams(window.location.search).get('id');

    async function loadApplicants() {
      const user = await getCurrentUser();
      if (!user || user.role !== 'employer') { window.location.href = '/login.html'; return; }
      if (!jobId) { window.location.href = '/employer/dashboard.html'; return; }
      try {
        const { job, applicants } = await apiFetch(`/api/employer/jobs/${jobId}/applicants`);
        document.getElementById('pageTitle').textContent = `Applicants — ${job.title}`;
        document.getElementById('pageSubtitle').textContent = `${applicants.length} applicant(s) for this position`;
        if (!applicants.length) {
          document.getElementById('appContent').innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-people fs-1 d-block mb-3"></i><p>No applicants yet.</p></div>`;
          return;
        }
        document.getElementById('appContent').innerHTML = `
          <table class="table table-hover mb-0">
            <thead><tr><th>Applicant</th><th>Email</th><th>Phone</th><th>CV</th><th>Status</th><th>Applied</th><th>Update Status</th></tr></thead>
            <tbody>${applicants.map(a => `
              <tr>
                <td class="fw-medium">${a.name}</td>
                <td class="text-muted small">${a.email}</td>
                <td class="text-muted small">${a.phone || '—'}</td>
                <td>${a.cv_file ? `<a href="${a.cv_file}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="bi bi-file-earmark-arrow-down me-1"></i>CV</a>` : '<span class="text-muted small">—</span>'}</td>
                <td><span class="badge bg-${badgeColor(a.status)}" id="status-${a.id}">${a.status}</span></td>
                <td class="text-muted small">${formatDate(a.created_at)}</td>
                <td>
                  <select class="form-select form-select-sm" style="width:130px;" onchange="updateStatus(${a.id}, this.value, this)">
                    ${['pending','reviewed','shortlisted','rejected','hired'].map(s => `<option ${a.status===s?'selected':''}>${s}</option>`).join('')}
                  </select>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        showAlert(err.message);
      }
    }

    async function updateStatus(appId, status, select) {
      select.disabled = true;
      try {
        await apiFetch(`/api/employer/applications/${appId}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        const badge = document.getElementById(`status-${appId}`);
        badge.className = `badge bg-${badgeColor(status)}`;
        badge.textContent = status;
        showAlert('Status updated.', 'success');
      } catch (err) {
        showAlert(err.message);
      }
      select.disabled = false;
    }

    document.addEventListener('DOMContentLoaded', loadApplicants);
  </script>
</body>
</html>
